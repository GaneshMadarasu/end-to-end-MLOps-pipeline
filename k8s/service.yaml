apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: mlops
  labels:
    app: model-serving
spec:
  type: ClusterIP
  selector:
    app: model-serving
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving-lb
  namespace: mlops
  labels:
    app: model-serving
spec:
  type: LoadBalancer
  selector:
    app: model-serving
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
