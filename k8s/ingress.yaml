apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-serving-ingress
  namespace: mlops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: mlops.example.com
      http:
        paths:
          - path: /predict
            pathType: Prefix
            backend:
              service:
                name: model-serving
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: model-serving
                port:
                  number: 80
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: model-serving
                port:
                  number: 80
