[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: marks tests requiring external services (MLflow, Airflow)
    slow: marks tests that take a long time to run
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
